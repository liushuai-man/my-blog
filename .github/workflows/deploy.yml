name: Deploy Blog

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 18

      # ✅ 安装 pnpm
      - name: Install pnpm
        run: npm install -g pnpm

      # ✅ 用 pnpm 安装依赖
      - name: Install dependencies
        run: pnpm install

      # ✅ 构建
      - name: Build project
        run: pnpm build

      # ✅ 部署
      - name: Deploy
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist